<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BITS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body, html { margin: 0; padding: 0; height: 100dvh; width: 100vw; background-color: #0f0f0f !important; overflow: hidden; }
        .swiper { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background-color: #0f0f0f; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100dvh; margin: 0 !important; }
        .card { background-color: #1a1a1a !important; color: #fff; padding: 35px; border-radius: 24px; width: 85vw; max-width: 450px; height: 70vh; border: 1px solid #333; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        h2 { color: #00d4ff !important; font-size: 1.6rem; margin: 0 0 15px 0; }
        .author { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
        .content { font-size: 1.3rem; line-height: 1.5; margin-bottom: 25px; }
        .action { font-size: 1.2rem; color: #ff9900 !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper" id="target"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // Configuration: Update this number when you add new data files
    const totalDecks = 130; 

    const swiper = new Swiper('.swiper', {
        direction: 'vertical',
        slidesPerView: 1,
        on: {
            reachEnd: () => loadNextDeck()
        }
    });

    // Randomize helper
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Logic to fetch a random file
    async function loadNextDeck() {
        // Pick a random number between 1 and totalDecks
        const randomDeck = Math.floor(Math.random() * totalDecks) + 1;
        
        try {
            const response = await fetch(`data_${randomDeck}.json`);
            if (!response.ok) throw new Error("File not found");
            
            const data = await response.json();
            const shuffled = shuffleArray(data);
            
            shuffled.forEach(entry => {
                swiper.appendSlide(`
                    <div class="swiper-slide">
                        <div class="card">
                            <h2>${entry.title}</h2>
                            <div class="author">${entry.author}</div>
                            <div class="content">${entry.content}</div>
                            <div class="action">${entry.action}</div>
                        </div>
                    </div>
                `);
            });
            swiper.update();
        } catch (e) {
            console.error("Error loading deck:", e);
        }
    }

    // Initial Load
    loadNextDeck();
</script>
</body>
</html>
