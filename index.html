<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Library</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css"/>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #050505; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden;
        }
        .swiper { width: 100%; height: 100vh; }
        .card { 
            display: flex; flex-direction: column; justify-content: center; 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; 
            padding: 30px; color: #eee; height: 100%; box-sizing: border-box;
        }
        h2 { color: #888; font-size: 1.1rem; text-transform: uppercase; margin-bottom: 10px; }
        .author { color: #555; font-size: 0.9rem; margin-bottom: 30px; }
        .content { font-size: 1.3rem; line-height: 1.5; margin-bottom: 30px; text-align: left; }
        .action { font-style: italic; color: #aaa; border-top: 1px solid #333; padding-top: 20px; font-size: 1.1rem; }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .card { padding: 25px; }
            h2 { font-size: 1.2rem; }
            .content { font-size: 1.4rem; line-height: 1.5; }
            .action { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="swiper">
        <div class="swiper-wrapper" id="content-container">
            <!-- Content loaded via library.txt -->
        </div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        fetch('library.txt')
            .then(response => response.text())
            .then(data => {
                const container = document.getElementById('content-container');
                container.innerHTML = data;
                
                // Shuffle logic
                const slides = Array.from(container.children);
                for (let i = slides.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [slides[i], slides[j]] = [slides[j], slides[i]];
                }
                slides.forEach(slide => container.appendChild(slide));
                
                // Initialize Swiper
                new Swiper('.swiper', { 
                    direction: 'vertical', 
                    loop: true,
                    grabCursor: true
                });
            })
            .catch(err => {
                document.body.innerHTML = "<div style='color:white; padding:40px; text-align:center;'>Error loading library.txt. Ensure it exists in the same folder.</div>";
            });
    </script>
</body>
</html>
