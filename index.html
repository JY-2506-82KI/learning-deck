<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Library</title>
    <style>
    body, html { 
        margin: 0; padding: 0; 
        height: 100%; width: 100%; 
        background: #0f0f0f; 
        overflow: hidden; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    .swiper { 
        width: 100vw; 
        height: 100vh; 
    }
    
    .swiper-slide { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        width: 100vw; 
        height: 100vh;
        /* Manual Nudge: Pulls the whole card up slightly to visually center it */
        margin-top: -5vh; 
    }

    .card { 
        background: #1a1a1a; 
        color: #fff; 
        padding: 35px; 
        border-radius: 24px; 
        width: 92vw; 
        max-width: 450px;
        /* Change min-height to height to ensure it doesn't fluctuate */
        height: 80vh; 
        
        border: 1px solid #333;
        box-sizing: border-box;
        
        display: flex; 
        flex-direction: column; 
        justify-content: center; /* Centers text inside the card */
    }

    h2 { color: #00d4ff; font-size: 1.6rem; margin-top: 0; }
    .author { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
    .content { font-size: 1.4rem; line-height: 1.5; margin-bottom: 25px; }
    .action { font-size: 1.2rem; color: #ff9900; font-weight: bold; }
</style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper" id="target"></div>
</div>

<script>
    // 1. Data
    const libraryData = [
        { title: "The Feedback Loop", author: "From: High Output Management", content: "The value of any process is determined by its feedback loop. Shorten the cycle, even if it hurts.", action: "Action: Reduce a feedback loop by 50%." },
        { title: "The Second-Order Effect", author: "From: Thinking in Systems", content: "Every intervention in a system has a ripple effect. Good system managers anticipate the backlash before it happens.", action: "Action: Identify the 'backlash' to a new plan." },
        { title: "The Cognitive Miser", author: "From: Predictably Irrational", content: "Your brain will choose the path of least resistance. Create artificial friction to force deliberate thinking.", action: "Action: Create a 'thinking pause' for decisions." },
        { title: "The Sunk Cost Fallacy", author: "From: The Art of Thinking Clearly", content: "\"I've come too far to turn back\" is a trap. Future value is the only metric that matters.", action: "Action: Abandon a failing task." },
        { title: "The Principle of Asymmetry", author: "From: Antifragile", content: "Look for opportunities with limited downside and high upside. Avoid the reverse.", action: "Action: Audit a project for its 'asymmetry'." }
    ];

    // 2. Render without any external library dependencies first
    const target = document.getElementById('target');
    const shuffled = [...libraryData].sort(() => Math.random() - 0.5);

    target.innerHTML = shuffled.map(entry => `
        <div class="swiper-slide">
            <div class="card">
                <h2>${entry.title}</h2>
                <div class="author">${entry.author}</div>
                <div class="content">${entry.content}</div>
                <div class="action">${entry.action}</div>
            </div>
        </div>
    `).join('');
</script>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    new Swiper('.swiper', { direction: 'vertical', slidesPerView: 1 });
</script>
</body>
</html>
