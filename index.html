<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Library</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: #0f0f0f; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; 
        }
        .swiper { width: 100vw; height: 100vh; }
        .swiper-slide { 
            display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh;
        }
        .card { 
            background: #1a1a1a; color: #fff; padding: 25px; border-radius: 20px; 
            width: 90vw; max-width: 400px; border: 1px solid #333;
            box-sizing: border-box; max-height: 80vh; overflow-y: auto;
        }
        h2 { margin-top: 0; color: #00d4ff; font-size: 1.4rem; }
        .author { font-size: 0.8rem; color: #888; margin-bottom: 15px; }
        .content { line-height: 1.5; margin-bottom: 20px; }
        .action { font-weight: bold; color: #ff9900; }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // Your 200+ library entries
    const libraryData = [
        { title: "The Asymmetry of Action", author: "From: The Black Swan", content: "Limit downside, maximize upside.", action: "Action: Identify one 'unlimited upside' activity." },
        { title: "The Feedback Loop", author: "From: High Output Management", content: "Value is determined by feedback speed.", action: "Action: Reduce a loop by 50%." },
        { title: "Inversion of Failure", author: "From: Principles", content: "Fix the design, not just the error.", action: "Action: Re-design a process." }
        // ... Add all 200 entries here ...
    ];

    // Fisher-Yates Shuffle Algorithm
    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initLibrary() {
        const shuffledData = shuffle(libraryData);

        new Swiper('.swiper', {
            direction: 'vertical',
            slidesPerView: 1,
            // Virtual module keeps memory usage low
            virtual: {
                slides: shuffledData.map(entry => `
                    <div class="card">
                        <h2>${entry.title}</h2>
                        <div class="author">${entry.author}</div>
                        <div class="content">${entry.content}</div>
                        <div class="action">${entry.action}</div>
                    </div>
                `)
            },
            observer: true,
            observeParents: true
        });
    }

    window.addEventListener('load', initLibrary);
</script>
</body>
</html>
