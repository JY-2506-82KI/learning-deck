<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Library</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    
    <style>
        /* Force root to be absolute */
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw; 
            background: #0f0f0f; 
            overflow: hidden; 
        }
        
        .swiper { 
            width: 100vw !important; 
            height: 100vh !important; 
        }
        
        .swiper-wrapper { 
            width: 100vw !important; 
            height: 100vh !important; 
        }

        .swiper-slide { 
            width: 100vw !important; 
            height: 100vh !important;
            display: flex !important; 
            align-items: center !important; 
            justify-content: center !important;
        }

        .card { 
            background: #1a1a1a; 
            color: #fff; 
            padding: 25px; 
            border-radius: 20px; 
            width: 90vw; 
            max-width: 400px;
            box-sizing: border-box;
            border: 1px solid #333;
            /* Allow the card to be readable if it's too tall */
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper" id="card-container">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // Assuming your data is already loaded in 'libraryData'
    function initLibrary() {
        const container = document.getElementById('card-container');
        // Your existing mapping code here...

        new Swiper('.swiper', {
            direction: 'vertical',
            slidesPerView: 1,
            // These ensure the slider doesn't get 'stuck'
            observer: true,
            observeParents: true,
            observerSlideChildren: true,
            // Force re-calculation
            resizeObserver: true 
        });
    }

    window.addEventListener('load', initLibrary);
</script>
</body>
</html>
