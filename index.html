<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA meta tags to force "App-like" behavior -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Library</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css"/>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; 
            height: 100dvh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden;
        }
        .swiper { width: 100%; height: 100dvh; }
        .swiper-slide { 
            display: flex; align-items: center; justify-content: center;
            height: 100dvh;
        }
        .card { 
            display: flex; flex-direction: column; justify-content: space-between; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; 
            padding: 30px; color: #eee; 
            width: 90%; height: 85dvh; box-sizing: border-box;
        }
        .text-area { flex-grow: 1; overflow-y: auto; }
        h2 { color: #888; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; }
        .author { color: #555; font-size: 0.8rem; margin-bottom: 20px; }
        .content { font-size: 1.3rem; line-height: 1.5; margin-bottom: 20px; }
        .action { 
            font-style: italic; color: #aaa; border-top: 1px solid #333; 
            padding-top: 20px; font-size: 1.1rem; flex-shrink: 0;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .card { padding: 25px; height: 88dvh; }
            .content { font-size: 1.4rem; }
            .action { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="swiper">
        <div class="swiper-wrapper" id="content-container">
            <!-- Content loaded via library.txt -->
        </div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        fetch('library.txt')
            .then(response => response.text())
            .then(data => {
                const container = document.getElementById('content-container');
                container.innerHTML = data;
                
                const slides = Array.from(container.children);
                for (let i = slides.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [slides[i], slides[j]] = [slides[j], slides[i]];
                }
                slides.forEach(slide => container.appendChild(slide));
                
                new Swiper('.swiper', { 
                    direction: 'vertical', 
                    loop: true,
                    grabCursor: true,
                    slidesPerView: 1
                });
            })
            .catch(err => {
                document.body.innerHTML = "<div style='color:white; padding:40px;'>Error loading library.txt.</div>";
            });
    </script>
</body>
</html>
