<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css"/>
    <style>
        body, html { margin: 0; padding: 0; background: #050505; height: 100%; font-family: sans-serif; }
        .swiper { width: 100%; height: 100vh; }
        .card { display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; color: #eee; height: 100%; box-sizing: border-box; }
        h2 { color: #888; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; }
        .author { color: #555; font-size: 0.8rem; margin-bottom: 20px; }
        .content { font-size: 1.1rem; line-height: 1.5; margin-bottom: 20px; text-align: left; }
        .action { font-style: italic; color: #aaa; border-top: 1px solid #333; padding-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="swiper"><div class="swiper-wrapper" id="content-container">
        <!-- Content will be injected here -->
    </div></div>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        // Fetch your 5,000 entries from a separate file
        fetch('library.txt')
            .then(response => response.text())
            .then(data => {
                document.getElementById('content-container').innerHTML = data;
                new Swiper('.swiper', { direction: 'vertical' });
            });
    </script>
</body>
</html>
