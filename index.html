<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Library</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    
    <style>
        /* Force full screen and lock scrolling to Swiper only */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #0f0f0f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
        }
        
        .swiper { 
            width: 100vw; height: 100vh; 
            touch-action: none; /* Disables native browser gestures */
        }
        
        .swiper-wrapper { width: 100%; height: 100%; }

        .swiper-slide { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; height: 100%;
            padding: 20px; box-sizing: border-box;
        }

        .card { 
            background: #1a1a1a; color: #fff; padding: 30px; border-radius: 20px; 
            width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h2 { margin-top: 0; color: #00d4ff; font-size: 1.5rem; }
        .author { font-size: 0.8rem; color: #888; margin-bottom: 15px; }
        .content { line-height: 1.6; margin-bottom: 20px; }
        .action { font-weight: bold; color: #ff9900; }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper" id="card-container">
        </div>
    <div class="swiper-pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const libraryData = [
        { title: "The Asymmetry of Action", author: "From: The Black Swan", content: "Limit your exposure to catastrophic downside, but maximize your exposure to unlimited upside.", action: "Action: Identify one 'unlimited upside' activity." },
        { title: "The Feedback Loop", author: "From: High Output Management", content: "The value of any process is determined by its feedback loop. If the results take too long, you are flying blind.", action: "Action: Reduce a feedback loop by 50%." },
        { title: "Inversion of Failure", author: "From: Principles", content: "Don't blame the environment; blame the design of your own decision-making process.", action: "Action: Re-design a decision process." }
        // Add your additional entries here
    ];

    function initLibrary() {
        const container = document.getElementById('card-container');
        
        const html = libraryData.map(entry => `
            <div class="swiper-slide">
                <div class="card">
                    <h2>${entry.title}</h2>
                    <div class="author">${entry.author}</div>
                    <div class="content">${entry.content}</div>
                    <div class="action">${entry.action}</div>
                </div>
            </div>
        `).join('');

        container.innerHTML = html;

        new Swiper('.swiper', {
            direction: 'horizontal',
            loop: true,
            slidesPerView: 1,
            grabCursor: true,
            touchEventsTarget: 'wrapper',
            touchStartPreventDefault: true,
            touchMoveStopPropagation: true,
            observer: true,
            observeParents: true,
            pagination: { el: '.swiper-pagination', clickable: true }
        });
    }

    window.addEventListener('DOMContentLoaded', initLibrary);
</script>

</body>
</html>
