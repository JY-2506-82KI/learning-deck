<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Library</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f0f0f; overflow: hidden; }
        .swiper { width: 100vw; height: 100vh; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
        .card { background: #1a1a1a; color: #fff; padding: 40px; border-radius: 24px; width: 85vw; max-width: 500px; border: 1px solid #333; box-sizing: border-box; }
        h2 { color: #00d4ff; }
    </style>
</head>
<body>

<div class="swiper"><div class="swiper-wrapper"></div></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // 1. Keep your data in a simple array
    const libraryData = [ /* Your 200 items */ ];

    // 2. Randomize BEFORE Swiper touches it
    const shuffled = [...libraryData].sort(() => Math.random() - 0.5);

    // 3. Initialize Swiper using the Virtual module
    new Swiper('.swiper', {
        direction: 'vertical',
        slidesPerView: 1,
        virtual: {
            slides: shuffled.map(entry => `
                <div class="card">
                    <h2>${entry.title}</h2>
                    <div class="author">${entry.author}</div>
                    <div class="content">${entry.content}</div>
                    <div class="action">${entry.action}</div>
                </div>
            `),
        },
    });
</script>
</body>
</html>
