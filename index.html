<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            background: #0f0f0f; 
            overflow: hidden; 
        }

        .swiper { 
            width: 100vw; 
            height: 100dvh; /* Dynamic viewport height */
        }
        
        .swiper-slide { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100vw; 
            height: 100dvh;
        }

        .card { 
            /* Force a larger footprint */
            width: 90vw; 
            max-width: 500px;
            min-height: 400px;
            
            background: #1a1a1a; 
            color: #fff; 
            padding: 40px; /* Increased padding for better readability */
            border-radius: 24px; 
            border: 1px solid #333;
            box-sizing: border-box;
            
            /* Center text and ensure font is readable */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { color: #00d4ff; font-size: 1.8rem; margin-top: 0; }
        .content { font-size: 1.2rem; line-height: 1.6; }
        .action { font-size: 1.1rem; color: #ff9900; margin-top: 20px; font-weight: bold; }
    </style>
</head>
