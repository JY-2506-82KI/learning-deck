<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Library</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    
    <style>
    body, html { 
        margin: 0; padding: 0; 
        height: 100%; width: 100%;
        background: #0f0f0f; 
        font-family: sans-serif;
    }
    
    /* Use flexbox to take full height of the browser chrome */
    .swiper { 
        width: 100vw; 
        height: 100vh;
        /* Critical for vertical apps */
        display: flex;
    }
    
    .swiper-wrapper { 
        width: 100%; 
        height: 100%; 
    }

    .swiper-slide { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        height: 100%; /* Force height to match wrapper */
    }

    .card { 
        background: #1a1a1a; 
        color: #fff; 
        padding: 30px; 
        border-radius: 20px; 
        width: 85%; 
        max-width: 400px;
        box-sizing: border-box; /* Ensures padding doesn't push it out of view */
        border: 1px solid #333;
    }
</style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper" id="card-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const libraryData = [
        { title: "The Asymmetry of Action", author: "From: The Black Swan", content: "Limit your exposure to catastrophic downside, but maximize your exposure to unlimited upside.", action: "Action: Identify one 'unlimited upside' activity." },
        { title: "The Feedback Loop", author: "From: High Output Management", content: "The value of any process is determined by its feedback loop.", action: "Action: Reduce a feedback loop by 50%." }
    ];

    function initLibrary() {
        const container = document.getElementById('card-container');
        container.innerHTML = libraryData.map(entry => `
            <div class="swiper-slide">
                <div class="card">
                    <h2>${entry.title}</h2>
                    <div class="author">${entry.author}</div>
                    <div class="content">${entry.content}</div>
                    <div class="action">${entry.action}</div>
                </div>
            </div>
        `).join('');

        new Swiper('.swiper', {
    direction: 'vertical',
    slidesPerView: 1,
    // CRITICAL: Force Swiper to handle height calculations internally
    autoHeight: false, 
    // This makes the swipe gesture much more responsive
    resistance: false, 
    // Ensures swiper doesn't get "confused" by the browser's dynamic UI
    observer: true,
    observeParents: true,
    observeSlideChildren: true
});
    }

    window.addEventListener('DOMContentLoaded', initLibrary);
</script>
</body>
</html>
